apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
  labels:
    app: sports-platform
    component: loki
data:
  loki.yaml: |
    # Minimal Loki configuration for Grafana OSS stack
    # Compatible with grafana/loki:3.3.0

    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9095

    common:
      path_prefix: /tmp/loki
      storage:
        filesystem:
          chunks_directory: /tmp/loki/chunks
          rules_directory: /tmp/loki/rules
      ring:
        kvstore:
          store: inmemory
        replication_factor: 1

    ingester:
      chunk_encoding: lz4
      chunk_idle_period: 30m
      chunk_retain_period: 1m
      chunk_block_size: 262144
      max_chunk_age: 2h
      wal:
        dir: /tmp/wal

    limits_config:
      allow_structured_metadata: false
      ingestion_burst_size_mb: 20
      ingestion_rate_mb: 10
      max_cache_freshness_per_query: 10m
      max_streams_per_user: 0
      per_stream_rate_limit: 50MB
      reject_old_samples: true
      reject_old_samples_max_age: 168h

    memberlist:
      join_members:
        - loki-memberlist

    query_range:
      align_queries_with_step: true
      cache_results: true
      max_retries: 5

    schema_config:
      configs:
        - from: "2024-01-01"
          index:
            period: 24h
            prefix: loki_index_
          object_store: filesystem
          schema: v13
          store: boltdb-shipper

    storage_config:
      boltdb_shipper:
        active_index_directory: /tmp/loki/index
        cache_location: /tmp/loki/cache
        cache_ttl: 24h

    compactor:
      working_directory: /tmp/loki/compactor

---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: monitoring
  labels:
    app: sports-platform
    component: loki
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3100
      targetPort: http
    - name: grpc
      port: 9095
      targetPort: grpc
  selector:
    app: sports-platform
    component: loki

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: monitoring
  labels:
    app: sports-platform
    component: loki
spec:
  serviceName: loki
  replicas: 1
  selector:
    matchLabels:
      app: sports-platform
      component: loki
  template:
    metadata:
      labels:
        app: sports-platform
        component: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.3.0
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - name: http
              containerPort: 3100
            - name: grpc
              containerPort: 9095
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: storage
              mountPath: /tmp/loki
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: loki-memberlist
  namespace: monitoring
  labels:
    app: sports-platform
    component: loki
spec:
  type: ClusterIP
  ports:
    - name: memberlist
      port: 7946
      targetPort: 7946
  selector:
    app: sports-platform
    component: loki
