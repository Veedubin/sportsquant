apiVersion: apps/v1
kind: Deployment
metadata:
  name: nba-stats-fetcher
  labels:
    app: sports-platform
    component: datasource
spec:
  replicas: 1
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sports-platform
      component: datasource
  template:
    metadata:
      labels:
        app: sports-platform
        component: datasource
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: nba-stats-fetcher
          image: nba-stats-client:local
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "src.datasource.nba_stats.client"]
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "sports-cluster-kafka-bootstrap:9092"
            - name: PYTHONPATH
              value: "/app"
            - name: NBA_SEASON
              value: "2024-25"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nba-stats-weekly
  labels:
    app: nba-stats-fetcher
    component: datasource
spec:
  schedule: "0 2 * * 0"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: nba-stats-fetcher
        spec:
          restartPolicy: OnFailure
          containers:
            - name: nba-stats-fetcher
              image: nba-stats-client:local
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "src.datasource.nba_stats.client"]
              env:
                - name: KAFKA_BOOTSTRAP_SERVERS
                  value: "sports-cluster-kafka-bootstrap:9092"
                - name: PYTHONPATH
                  value: "/app"
                - name: NBA_SEASON
                  value: "2024-25"
                - name: LOG_LEVEL
                  value: "INFO"
              resources:
                requests:
                  cpu: "500m"
                  memory: "1Gi"
                limits:
                  cpu: "2000m"
                  memory: "4Gi"
