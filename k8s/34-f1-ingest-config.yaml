apiVersion: v1
kind: ConfigMap
metadata:
  name: f1-ingest-config
  namespace: default
  labels:
    app: sports-platform
    component: league-ingest
    league: f1
data:
  LEAGUE_API_BASE_URL: "https://api.the-odds-api.com/v4/sports/motorsport_formula_1"
  POLL_INTERVAL_SECONDS: "15"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "150"
  LEAGUE_CODE: "F1"
  KAFKA_BOOTSTRAP_SERVERS: "sports-cluster-kafka-bootstrap.default.svc.cluster.local:9092"
  KAFKA_TOPIC: "f1-races"
  SCHEDULE_TOPIC: "sports-schedules"
  DB_HOST: "timescaledb.default.svc"
  DB_PORT: "5432"
  DB_NAME: "sports_analytics"
  DB_USER: "postgres"
  DB_PASSWORD: "password"
  DB_BUFFER_MAX_SIZE: "500"
  DB_BATCH_SIZE: "100"
  DB_FLUSH_INTERVAL: "5"
  SEASON_START_MONTH: "3"
  SEASON_END_MONTH: "11"
