apiVersion: apps/v1
kind: Deployment
metadata:
  name: stats-poller
  labels:
    app: sports-platform
    component: data-ingestion
spec:
  replicas: 1
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sports-platform
      component: data-ingestion
  template:
    metadata:
      labels:
        app: sports-platform
        component: data-ingestion
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: stats-poller
          image: nba-ingest:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "nba_ingest.stats_poller"]
          securityContext:
            seccompProfile:
              type: RuntimeDefault
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: KAFKA_BOOTSTRAP
              value: "sports-cluster-kafka-bootstrap:9092"
            - name: KAFKA_TOPIC_STATS
              value: "sports-analytics-player-stats"
            - name: TIMESCALE_DB_HOST
              value: "localhost"
            - name: TIMESCALE_DB_PORT
              value: "5432"
            - name: TIMESCALE_DB_NAME
              value: "sports_analytics"
            - name: TIMESCALE_DB_USER
              valueFrom:
                secretKeyRef:
                  name: timescaledb-credentials
                  key: username
                  optional: true
            - name: TIMESCALE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: timescaledb-credentials
                  key: password
                  optional: true
            - name: STATS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stats-api-credentials
                  key: api-key
                  optional: true
            - name: STATS_API_URL
              value: "https://api.stats-provider.com/v1"
            - name: POLL_INTERVAL_SECONDS
              value: "120"
            - name: BATCH_SIZE
              value: "50"
            - name: IGNITE_HOST
              value: "ignite-service"
            - name: IGNITE_PORT
              value: "10800"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
              ephemeral-storage: "500Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
              ephemeral-storage: "1Gi"
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
