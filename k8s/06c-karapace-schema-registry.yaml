---
# Actual Karapace Schema Registry - Works with KRaft-mode Kafka
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karapace-schema-registry
  labels:
    app: karapace-schema-registry
    component: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: karapace-schema-registry
  template:
    metadata:
      labels:
        app: karapace-schema-registry
    spec:
      containers:
        - name: karapace
          image: ghcr.io/aiven-dev/karapace:3.7.1
          command: ["karapace"]
          args:
            - "--registry-host"
            - "0.0.0.0"
            - "--registry-port"
            - "8081"
            - "--bootstrap_uri"
            - "sports-cluster-kafka-bootstrap.default.svc:9092"
            - "--group_id"
            - "karapace-schema-registry"
            - "--topic_name"
            - "_schemas"
            - "--log_level"
            - "DEBUG"
          ports:
            - containerPort: 8081
              name: rest-api
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /schemas
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /schemas
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: karapace-schema-registry
  labels:
    app: karapace-schema-registry
spec:
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: rest-api
  selector:
    app: karapace-schema-registry
