apiVersion: v1
kind: ConfigMap
metadata:
  name: nba-ingest-config
  namespace: default
  labels:
    app: sports-platform
    component: league-ingest
    league: nba
data:
  LEAGUE_API_BASE_URL: "https://api.the-odds-api.com/v4/sports/basketball_nba"
  POLL_INTERVAL_SECONDS: "60"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "5"
  LEAGUE_CODE: "NBA"
  KAFKA_BOOTSTRAP_SERVERS: "sports-cluster-kafka-bootstrap.default.svc.cluster.local:9092"
  KAFKA_TOPIC: "nba-odds"
  SCHEDULE_TOPIC: "sports-schedules"
  DB_HOST: "timescaledb.default.svc"
  DB_PORT: "5432"
  DB_NAME: "sports_analytics"
  DB_USER: "postgres"
  DB_PASSWORD: "password"
  DB_BUFFER_MAX_SIZE: "500"
  DB_BATCH_SIZE: "100"
  DB_FLUSH_INTERVAL: "5"
