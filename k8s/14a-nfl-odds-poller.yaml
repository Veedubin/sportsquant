apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfl-odds-poller
  labels:
    app: sports-platform
    component: data-ingestion
    league: nfl
spec:
  replicas: 0
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sports-platform
      component: data-ingestion
      league: nfl
  template:
    metadata:
      labels:
        app: sports-platform
        component: data-ingestion
        league: nfl
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: nfl-odds-poller
          image: nfl-ingest:v1.0.0
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "nfl_ingest"]
          args: ["poll"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: nfl-ingest-config
          env:
            - name: KAFKA_BOOTSTRAP
              value: "sports-cluster-kafka-bootstrap:9092"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
