---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ignite3-pvc
  labels:
    app: ignite3
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ignite3-wal-pvc
  labels:
    app: ignite3
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: standard
