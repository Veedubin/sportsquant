---
# Grafana Datasources ConfigMap (for data source provisioning)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels:
    app: sports-platform
    team: sports-platform
    grafana_datasource: "true"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Mimir
        type: prometheus
        url: http://mimir:9009/prometheus
        access: proxy
        isDefault: true
        uid: mimir
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
        uid: loki
      - name: Tempo
        type: tempo
        url: http://tempo:3100
        access: proxy
        uid: tempo
        jsonData:
          tracesToLogs:
            datasourceUid: loki
          serviceMap:
            datasourceUid: mimir
