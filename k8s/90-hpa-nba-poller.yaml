apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nba-poller-hpa
  labels:
    app: sports-platform
    component: poller
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nba-poller
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60
