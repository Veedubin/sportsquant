apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: spark-model-evaluator
  namespace: default
  labels:
    app: spark
    component: model-evaluator
    environment: development
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: nvcr.io/nvidia/spark:spark-3.5.0-cuda12-x86_64
  imagePullPolicy: IfNotPresent
  sparkVersion: 3.5.0
  mainApplicationFile: local:///opt/spark/work-dir/model_evaluator.py
  restartPolicy:
    type: Never
  sparkConf:
    # GPU Acceleration Configuration
    spark.rapids.sql.enabled: "true"
    spark.rapids.sql.concurrentGpuTasks: "2"
    spark.rapids.memory.gpu.minAllocFraction: "0.1"
    spark.rapids.memory.gpu.maxAllocFraction: "0.9"
    spark.rapids.memory.gpu.allocFraction: "0.8"
    # Memory Overhead for GPU workloads
    spark.driver.memoryOverhead: "2g"
    spark.executor.memoryOverhead: "2g"
    # Spark SQL Performance Tuning
    spark.sql.shuffle.partitions: "100"
    spark.sql.adaptive.enabled: "true"
    spark.sql.adaptive.coalescePartitions.enabled: "true"
    spark.sql.adaptive.skewJoin.enabled: "true"
    # Kafka Configuration
    spark.kafka.bootstrap.servers: "sports-cluster-kafka-bootstrap:9092"
    spark.kafka.subscribe: "sports.analytics.model-predictions"
    spark.kafka.topic: "sports.analytics.model-evaluation"
    # TimescaleDB Configuration
    spark.jdbc.url: "jdbc:postgresql://timescaledb:5432/sports_analytics"
    spark.jdbc.user: "postgres"
    spark.jdbc.password: "postgres"
    # Ignite Configuration for model cache
    spark.ignite.client.urls: "ignite-service:10800"
    spark.ignite.partitioned: "true"
  driver:
    cores: 2
    memory: "4g"
    labels:
      version: 3.5.0
    serviceAccount: spark
    gpu:
      name: nvidia.com/gpu
      quantity: 1
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      privileged: false
      capabilities:
        drop: ["ALL"]
    volumeMounts:
      - name: spark-work-dir
        mountPath: /opt/spark/work-dir
  executor:
    cores: 4
    instances: 2
    memory: "8g"
    labels:
      version: 3.5.0
    gpu:
      name: nvidia.com/gpu
      quantity: 1
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      privileged: false
      capabilities:
        drop: ["ALL"]
    volumeMounts:
      - name: spark-work-dir
        mountPath: /opt/spark/work-dir
  volumes:
    - name: spark-work-dir
      configMap:
        name: spark-model-evaluator
  deps:
    files:
      - local:///opt/spark/work-dir/model_evaluator.py
