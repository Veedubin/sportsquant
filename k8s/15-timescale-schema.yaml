    );

    SELECT create_hypertable('nhl_player_stats', 'time');
    CREATE INDEX IF NOT EXISTS idx_nhl_player_stats_player_id ON nhl_player_stats (player_id);
    CREATE INDEX IF NOT EXISTS idx_nhl_player_stats_game_id ON nhl_player_stats (game_id);
    CREATE INDEX IF NOT EXISTS idx_nhl_player_stats_team ON nhl_player_stats (team);

    -- ============================================================
    -- MLB Tables (odds snapshots and player stats)
    -- ============================================================

    -- Hypertable for MLB odds snapshots (time-series betting data)
    CREATE TABLE IF NOT EXISTS mlb_odds_snapshots (
        time TIMESTAMPTZ NOT NULL,
        game_id TEXT NOT NULL,
        team_home TEXT NOT NULL,
        team_away TEXT NOT NULL,
        odds_home DECIMAL(5,2),
        odds_away DECIMAL(5,2),
        over_under DECIMAL(5,2),
        sportsbook TEXT,
        captured_at TIMESTAMPTZ DEFAULT NOW()
    );

    SELECT create_hypertable('mlb_odds_snapshots', 'time');
    CREATE INDEX IF NOT EXISTS idx_mlb_odds_game_id ON mlb_odds_snapshots (game_id);
    CREATE INDEX IF NOT EXISTS idx_mlb_odds_sportsbook ON mlb_odds_snapshots (sportsbook);

    -- Hypertable for MLB player statistics (real-time performance metrics)
    CREATE TABLE IF NOT EXISTS mlb_player_stats (
        time TIMESTAMPTZ NOT NULL,
        player_id TEXT NOT NULL,
        player_name TEXT NOT NULL,
        team TEXT NOT NULL,
        game_id TEXT NOT NULL,
        stats JSONB,
        captured_at TIMESTAMPTZ DEFAULT NOW()
    );

    SELECT create_hypertable('mlb_player_stats', 'time');
    CREATE INDEX IF NOT EXISTS idx_mlb_player_stats_player_id ON mlb_player_stats (player_id);
    CREATE INDEX IF NOT EXISTS idx_mlb_player_stats_game_id ON mlb_player_stats (game_id);
    CREATE INDEX IF NOT EXISTS idx_mlb_player_stats_team ON mlb_player_stats (team);

    -- ============================================================
    -- F1 Tables (race results)
    -- ============================================================

    -- Hypertable for F1 race results (time-series motorsport data)
    CREATE TABLE IF NOT EXISTS f1_race_results (
        time TIMESTAMPTZ NOT NULL,
        race_id TEXT NOT NULL,
        race_name TEXT NOT NULL,
        circuit TEXT NOT NULL,
        position INTEGER,
        driver TEXT NOT NULL,
        constructor TEXT NOT NULL,
        laps INTEGER,
        time_gap TEXT,
        points INTEGER,
        captured_at TIMESTAMPTZ DEFAULT NOW()
    );

    SELECT create_hypertable('f1_race_results', 'time');
    CREATE INDEX IF NOT EXISTS idx_f1_results_race_id ON f1_race_results (race_id);
    CREATE INDEX IF NOT EXISTS idx_f1_results_driver ON f1_race_results (driver);
    CREATE INDEX IF NOT EXISTS idx_f1_results_constructor ON f1_race_results (constructor);
