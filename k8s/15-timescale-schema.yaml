    SELECT create_hypertable('nhl_odds_snapshots', 'time');
    CREATE INDEX IF NOT EXISTS idx_nhl_odds_game_id ON nhl_odds_snapshots (game_id);
    CREATE INDEX IF NOT EXISTS idx_nhl_odds_sportsbook ON nhl_odds_snapshots (sportsbook);

    -- Hypertable for NHL player statistics (real-time performance metrics)
    CREATE TABLE IF NOT EXISTS nhl_player_stats (
        time TIMESTAMPTZ NOT NULL,
        player_id TEXT NOT NULL,
        player_name TEXT NOT NULL,
        team TEXT NOT NULL,
        game_id TEXT NOT NULL,
        stats JSONB,
