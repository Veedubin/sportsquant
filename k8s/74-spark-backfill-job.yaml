apiVersion: batch/v1
kind: Job
metadata:
  name: spark-topic-backfill
  labels:
    app: sports-platform
    component: data-pipeline
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: sports-platform
        component: data-pipeline
    spec:
      serviceAccountName: spark
      restartPolicy: Never
      containers:
        - name: backfill
          image: docker.io/sports-platform/spark-data-producer:backfill-fix
          imagePullPolicy: Never
          command: ["python3", "-m", "src.data_pipeline.spark_topic_backfill"]
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "sports-cluster-kafka-bootstrap:9092"
            - name: PRODUCER_BATCH_SIZE
              value: "100"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
