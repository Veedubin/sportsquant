apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: sports-analytics-line-movements
  namespace: default
  labels:
    strimzi.io/cluster: sports-cluster
# Topic for tracking betting line movements and odds changes
# High frequency data, moderate retention for line history analysis
spec:
  partitions: 3
  replicas: 1
  config:
    retention.ms: 604800000
    cleanup.policy: delete
    segment.bytes: 1073741824
