# For KIND: Get cluster IP with `kubectl cluster-info`
# Add to /etc/hosts: "$(kubectl cluster-info | grep 'Kubernetes control plane' | awk '{print $NF}' | cut -d: -f1) grafana.local loki.local mimir.local tempo.local"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  rules:
    - host: grafana.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
