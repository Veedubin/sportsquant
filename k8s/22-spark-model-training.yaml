apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: spark-model-training
  namespace: default
  labels:
    app: spark
    component: model-training
    environment: development
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: nvcr.io/nvidia/spark:spark-3.5.0-cuda12-x86_64
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/work-dir/model_training.py
  sparkVersion: 3.5.0
  restartPolicy:
    type: Never
  sparkConf:
    # GPU Acceleration Configuration
    spark.rapids.sql.enabled: "true"
    spark.rapids.sql.concurrentGpuTasks: "2"
    spark.rapids.memory.gpu.minAllocFraction: "0.1"
    spark.rapids.memory.gpu.maxAllocFraction: "0.9"
    spark.rapids.memory.gpu.allocFraction: "0.8"
    # Memory Overhead for GPU workloads
    spark.driver.memoryOverhead: "2g"
    spark.executor.memoryOverhead: "2g"
    # Spark SQL Performance Tuning
    spark.sql.shuffle.partitions: "200"
    spark.sql.adaptive.enabled: "true"
    spark.sql.adaptive.coalescePartitions.enabled: "true"
    spark.sql.adaptive.skewJoin.enabled: "true"
    spark.sql.adaptive.skewJoin.skewedPartitionFactor: "5"
    spark.sql.adaptive.skewJoin.skewedPartitionThresholdInBytes: "256m"
    # Kafka Configuration for input data
    spark.kafka.bootstrap.servers: "sports-cluster-kafka-bootstrap:9092"
    spark.kafka.subscribe: "sports.analytics.live-odds,sports.analytics.player-stats,sports.analytics.game-results"
    # Ignite Configuration for feature cache
    spark.ignite.client.urls: "ignite-service:10800"
    spark.ignite.partitioned: "true"
    spark.ignite.nozzle.threads: "4"
  driver:
    cores: 2
    memory: "4g"
    labels:
      version: 3.5.0
    serviceAccount: spark
    gpu:
      name: nvidia.com/gpu
      quantity: 1
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      privileged: false
      capabilities:
        drop: ["ALL"]
    volumeMounts:
      - name: spark-work-dir
        mountPath: /opt/spark/work-dir
      - name: model-output
        mountPath: /opt/spark/output
  executor:
    cores: 4
    instances: 2
    memory: "8g"
    labels:
      version: 3.5.0
    gpu:
      name: nvidia.com/gpu
      quantity: 1
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      privileged: false
      capabilities:
        drop: ["ALL"]
    volumeMounts:
      - name: spark-work-dir
        mountPath: /opt/spark/work-dir
      - name: model-output
        mountPath: /opt/spark/output
  volumes:
    - name: spark-work-dir
      configMap:
        name: spark-model-training
    - name: model-output
      persistentVolumeClaim:
        claimName: model-output-pvc
  deps:
    files:
      - local:///opt/spark/work-dir/model_training.py
