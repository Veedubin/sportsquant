name: quantitative_sports

x-logging: &default-logging
  options:
    max-size: "10m"
    max-file: "3"

services:
  timescaledb:
    image: docker.io/timescale/timescaledb:latest-pg18
    container_name: quant-sports-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${QUANT_SPORTS_DB_USER:-quantitative_sports}
      POSTGRES_PASSWORD: ${QUANT_SPORTS_DB_PASSWORD:-quantitative_sports}
      POSTGRES_DB: ${QUANT_SPORTS_DB_NAME:-quantitative_sports}
    volumes:
      - timescaledb_data:/var/lib/postgresql
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    logging: *default-logging

  # ── Poller (Prefect/cron-based odds/injuries fetcher) ──────────────
  poller:
    build:
      context: .
      dockerfile: docker/Dockerfile.poller
    image: quant-sports/poller:latest
    container_name: quant-sports-poller
    environment:
      PYTHONUNBUFFERED: "1"
      QUANT_SPORTS_DB_HOST: timescaledb
      QUANT_SPORTS_DB_PORT: "5432"
      QUANT_SPORTS_DB_USER: ${QUANT_SPORTS_DB_USER:-quantitative_sports}
      QUANT_SPORTS_DB_PASSWORD: ${QUANT_SPORTS_DB_PASSWORD:-quantitative_sports}
      QUANT_SPORTS_DB_NAME: ${QUANT_SPORTS_DB_NAME:-quantitative_sports}
      QUANT_SPORTS_POLLER_SCHEDULER: ${QUANT_SPORTS_POLLER_SCHEDULER:-cron}
      QUANT_SPORTS_POLLER_ACTIVE_SPORTS: ${QUANT_SPORTS_POLLER_ACTIVE_SPORTS:-nfl,nba}
      QUANT_SPORTS_POLLER_LOG_LEVEL: ${QUANT_SPORTS_POLLER_LOG_LEVEL:-INFO}
      QUANT_SPORTS_POLLER_ODDS_API_KEY: ${QUANT_SPORTS_POLLER_ODDS_API_KEY:-}
      QUANT_SPORTS_POLLER_ODDS_API_INTERVAL_SECONDS: ${QUANT_SPORTS_POLLER_ODDS_API_INTERVAL_SECONDS:-86400}
      QUANT_SPORTS_POLLER_ESPN_INJURIES_INTERVAL_SECONDS: ${QUANT_SPORTS_POLLER_ESPN_INJURIES_INTERVAL_SECONDS:-900}
      QUANT_SPORTS_POLLER_MAX_RETRIES: ${QUANT_SPORTS_POLLER_MAX_RETRIES:-3}
      QUANT_SPORTS_POLLER_RETRY_DELAY: ${QUANT_SPORTS_POLLER_RETRY_DELAY:-30}
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  # ── Web UI (Ops Dashboard) ────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    image: quant-sports/web:latest
    container_name: quant-sports-web
    ports:
      - "8080:8080"
    environment:
      PYTHONUNBUFFERED: "1"
      QUANT_SPORTS_DB_HOST: timescaledb
      QUANT_SPORTS_DB_PORT: "5432"
      QUANT_SPORTS_DB_USER: ${QUANT_SPORTS_DB_USER:-quantitative_sports}
      QUANT_SPORTS_DB_PASSWORD: ${QUANT_SPORTS_DB_PASSWORD:-quantitative_sports}
      QUANT_SPORTS_DB_NAME: ${QUANT_SPORTS_DB_NAME:-quantitative_sports}
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging

volumes:
  timescaledb_data:
    driver: local

networks:
  default:
    name: quantitative_sports-net