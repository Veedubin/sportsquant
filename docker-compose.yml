version: "3.8"

services:
  # ── SportsQuant API ─────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OTEL_SERVICE_NAME=sportsquant-api
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    command: uv run sportsquant-api
    depends_on:
      timescaledb:
        condition: service_healthy
        required: false

  # ── Unified Poller (odds + stats + schedules) ─────────────────────────────
  poller:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      - OTEL_SERVICE_NAME=sportsquant-poller
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    command: uv run sportsquant-poller
    profiles:
      - full

  # ── Kafka (local dev broker) ─────────────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    profiles:
      - full

  # ── TimescaleDB ──────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=${TIMESCALE_PASSWORD:-sportsquant}
      - POSTGRES_DB=${TIMESCALE_DB:-sportsquant}
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - full

  # ── Redis (caching) ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - full

  # ── Apache Ignite (in-memory cache) ──────────────────────────────────────
  ignite:
    image: apacheignite/ignite:latest
    ports:
      - "10800:10800"
      - "8080:8080"
    profiles:
      - full

  # ── MLflow (experiment tracking) ─────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://postgres:${TIMESCALE_PASSWORD:-sportsquant}@timescaledb:5432/mlflow
    depends_on:
      timescaledb:
        condition: service_healthy
        required: false
    profiles:
      - ml

volumes:
  timescale_data: