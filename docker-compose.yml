name: sportsquant

x-logging: &default-logging
  options:
    max-size: "10m"
    max-file: "3"

services:
  timescaledb:
    image: docker.io/timescale/timescaledb:latest-pg18
    container_name: sportsquant-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${SPORTSQUANT_DB_USER:-sportsquant}
      POSTGRES_PASSWORD: ${SPORTSQUANT_DB_PASSWORD:-sportsquant}
      POSTGRES_DB: ${SPORTSQUANT_DB_NAME:-sportsquant}
    volumes:
      - timescaledb_data:/var/lib/postgresql
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    logging: *default-logging

  # ── Poller (Prefect/cron-based odds/injuries fetcher) ──────────────
  poller:
    build:
      context: .
      dockerfile: docker/Dockerfile.poller
    image: sportsquant/poller:latest
    container_name: sportsquant-poller
    environment:
      PYTHONUNBUFFERED: "1"
      SPORTSQUANT_DB_HOST: timescaledb
      SPORTSQUANT_DB_PORT: "5432"
      SPORTSQUANT_DB_USER: ${SPORTSQUANT_DB_USER:-sportsquant}
      SPORTSQUANT_DB_PASSWORD: ${SPORTSQUANT_DB_PASSWORD:-sportsquant}
      SPORTSQUANT_DB_NAME: ${SPORTSQUANT_DB_NAME:-sportsquant}
      SPORTSQUANT_POLLER_SCHEDULER: ${SPORTSQUANT_POLLER_SCHEDULER:-cron}
      SPORTSQUANT_POLLER_ACTIVE_SPORTS: ${SPORTSQUANT_POLLER_ACTIVE_SPORTS:-nfl,nba}
      SPORTSQUANT_POLLER_LOG_LEVEL: ${SPORTSQUANT_POLLER_LOG_LEVEL:-INFO}
      SPORTSQUANT_POLLER_ODDS_API_KEY: ${SPORTSQUANT_POLLER_ODDS_API_KEY:-}
      SPORTSQUANT_POLLER_ODDS_API_INTERVAL_SECONDS: ${SPORTSQUANT_POLLER_ODDS_API_INTERVAL_SECONDS:-86400}
      SPORTSQUANT_POLLER_ESPN_INJURIES_INTERVAL_SECONDS: ${SPORTSQUANT_POLLER_ESPN_INJURIES_INTERVAL_SECONDS:-900}
      SPORTSQUANT_POLLER_MAX_RETRIES: ${SPORTSQUANT_POLLER_MAX_RETRIES:-3}
      SPORTSQUANT_POLLER_RETRY_DELAY: ${SPORTSQUANT_POLLER_RETRY_DELAY:-30}
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  # ── Web UI (Ops Dashboard) ────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    image: sportsquant/web:latest
    container_name: sportsquant-web
    ports:
      - "8080:8080"
    environment:
      PYTHONUNBUFFERED: "1"
      SPORTSQUANT_DB_HOST: timescaledb
      SPORTSQUANT_DB_PORT: "5432"
      SPORTSQUANT_DB_USER: ${SPORTSQUANT_DB_USER:-sportsquant}
      SPORTSQUANT_DB_PASSWORD: ${SPORTSQUANT_DB_PASSWORD:-sportsquant}
      SPORTSQUANT_DB_NAME: ${SPORTSQUANT_DB_NAME:-sportsquant}
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging

volumes:
  timescaledb_data:
    driver: local

networks:
  default:
    name: sportsquant-net