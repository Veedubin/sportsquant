<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SportsQuant — {{ page_title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-3">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-green-400 hover:text-green-300 transition">SportsQuant</a>
            <div class="flex gap-6 text-sm">
                <a href="/" class="hover:text-green-400 transition {% if page_title == 'Dashboard' %}text-green-400{% else %}text-gray-300{% endif %}">Dashboard</a>
                <a href="/ev" class="hover:text-green-400 transition {% if page_title == 'EV Calculator' %}text-green-400{% else %}text-gray-300{% endif %}">EV Calculator</a>
                <a href="/backtest" class="hover:text-green-400 transition {% if page_title == 'Backtest' %}text-green-400{% else %}text-gray-300{% endif %}">Backtest</a>
                <a href="/ratings" class="hover:text-green-400 transition {% if page_title == 'Power Ratings' %}text-green-400{% else %}text-gray-300{% endif %}">Ratings</a>
            </div>
        </div>
    </nav>
    <main class="max-w-6xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
    <footer class="border-t border-gray-800 mt-12 py-4 text-center text-sm text-gray-500">
        SportsQuant v0.2.0 — Open-source quantitative sports analysis
    </footer>
</body>
</html>
